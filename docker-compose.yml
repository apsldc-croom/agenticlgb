# =============================================================
# docker-compose.yml  —  Development stack
# =============================================================
# Usage:
#   docker compose up -d            # start everything
#   docker compose logs -f backend  # tail logs
#   docker compose exec backend python manage.py migrate
#   docker compose down -v          # stop + remove volumes
#
# Services:
#   db        PostgreSQL 16
#   redis     Redis 7 (Celery broker + result backend)
#   backend   Django + Gunicorn  →  :8000
#   worker    Celery worker      (no exposed port)
#   frontend  Nginx + Vite dist  →  :80
#
# All backend + worker containers share the same image build.
# Hot-reload in dev: mount src/ as a volume and run with runserver instead.
# =============================================================

services:

  # -----------------------------------------------------------
  # PostgreSQL
  # -----------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: lgb_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
    ports:
      - "5432:5432"       # exposed so you can connect from host (pgAdmin etc.)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # Redis (Celery broker + result backend)
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: lgb_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # Django Backend
  # -----------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: lgb_backend
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DEBUG: "true"
      DATABASE_URL: postgres://postgres:123@db:5432/postgres
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CORS_ALLOWED_ORIGINS: "http://localhost,http://localhost:80"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Hot-reload: mount source so code changes reflect without rebuild
      - ./LGB-backend:/app
      - staticfiles:/app/staticfiles
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # -----------------------------------------------------------
  # Celery Worker
  # -----------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: lgb_worker
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgres://postgres:123@db:5432/postgres
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./LGB-backend:/app   # same hot-reload mount

  # -----------------------------------------------------------
  # Nginx + Frontend
  # -----------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: lgb_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - staticfiles:/app/staticfiles:ro  # serve Django static files

# -----------------------------------------------------------
# Named Volumes
# -----------------------------------------------------------
volumes:
  pgdata:
  staticfiles:
