name: CD — Deploy to Server

# Triggers:
#   - Push to main (auto-deploy after CI passes)
#   - Manual trigger from GitHub Actions UI (workflow_dispatch)
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy"
        required: false
        default: "Manual trigger"

# Only one deploy runs at a time — cancel queued if a new push arrives
concurrency:
  group: deploy-production
  cancel-in-progress: false   # false = let running deploy finish, queue next

jobs:
  deploy:
    name: Deploy to VM (34.93.126.189)
    runs-on: ubuntu-latest

    # Only deploy if CI passed (when triggered by push)
    # workflow_dispatch bypasses this check intentionally
    needs: []   # Remove this line and add "needs: [backend, frontend]" once CI is in same file

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------
      # SSH into VM and deploy
      # -----------------------------------------------------------
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 20m
          script: |
            set -e

            echo "=== [1/6] Pulling latest code ==="
            cd /opt/agenticlgb
            git pull origin main

            echo "=== [2/6] Building + starting containers ==="
            docker compose -f docker-compose.prod.yml \
              --env-file .env.prod \
              up -d --build \
              --remove-orphans

            echo "=== [3/6] Waiting for backend health ==="
            sleep 10
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' lgb_backend_prod 2>/dev/null || echo "missing")
              echo "  attempt $i: $STATUS"
              [ "$STATUS" = "healthy" ] && break
              [ $i -eq 12 ] && { echo "Backend never became healthy!"; exit 1; }
              sleep 5
            done

            echo "=== [4/6] Running migrations ==="
            docker compose -f docker-compose.prod.yml \
              --env-file .env.prod \
              exec -T backend python manage.py migrate --noinput

            echo "=== [5/6] Collecting static files ==="
            docker compose -f docker-compose.prod.yml \
              --env-file .env.prod \
              exec -T backend python manage.py collectstatic --noinput --clear

            echo "=== [6/6] Health check ==="
            sleep 3
            curl -f http://localhost/api/health/ || { echo "Health check FAILED"; exit 1; }

            echo ""
            echo "✅ Deploy complete — $(date '+%Y-%m-%d %H:%M:%S %Z')"

      # -----------------------------------------------------------
      # Notify on failure (add Slack/email webhook here later)
      # -----------------------------------------------------------
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy to 34.93.126.189 FAILED — check logs above"
          # TODO: Add Slack / email notification here
