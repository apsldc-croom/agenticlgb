# =============================================================
# docker-compose.prod.yml  —  Production stack
# =============================================================
# Usage on server:
#   git pull origin main
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#   docker compose -f docker-compose.prod.yml exec backend python manage.py migrate
#   docker compose -f docker-compose.prod.yml exec backend python manage.py collectstatic --noinput
#
# Differences from dev:
#   - No source volume mounts (code baked into image)
#   - restart: always (survives reboots)
#   - DEBUG=false
#   - Settings from .env.prod via --env-file flag
#   - Backend port NOT exposed (nginx proxies internally)
#   - DB port NOT exposed (no external access)
# =============================================================

services:

  db:
    image: postgres:16-alpine
    container_name: lgb_db_prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agenticlgb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No port exposure in production — only accessible within Docker network

  redis:
    image: redis:7-alpine
    container_name: lgb_redis_prod
    restart: always
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: lgb_backend_prod
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DEBUG: "false"
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agenticlgb}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - staticfiles_prod:/app/staticfiles
    # No port 8000 exposed — nginx proxies internally
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: lgb_worker_prod
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agenticlgb}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: lgb_frontend_prod
    restart: always
    ports:
      - "80:80"
      # Uncomment when SSL is configured:
      # - "443:443"
    depends_on:
      - backend
    volumes:
      - staticfiles_prod:/app/staticfiles:ro

volumes:
  pgdata_prod:
  redisdata:
  staticfiles_prod:
