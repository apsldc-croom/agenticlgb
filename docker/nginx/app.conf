# =============================================================
# docker/nginx/app.conf
# LGB Platform — Nginx server block
#
# Routing:
#   /api/*          → Django backend (Gunicorn on port 8000)
#   /admin/*        → Django admin
#   /static/*       → Django collected static files
#   /               → Vite frontend (SPA, served from /usr/share/nginx/html)
#
# Usage: mounted into the Nginx container at /etc/nginx/conf.d/app.conf
# =============================================================

upstream django_backend {
    server backend:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # --- Health check (no logging) ---
    location = /api/health/ {
        proxy_pass http://django_backend;
        access_log off;
    }

    # --- Django API ---
    location /api/ {
        proxy_pass         http://django_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # --- Django Admin ---
    location /admin/ {
        proxy_pass         http://django_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- Django static files (collectstatic output) ---
    location /static/ {
        alias /app/staticfiles/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # --- Frontend SPA ---
    # All unmatched routes fall back to index.html so React Router works
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache HTML briefly, assets aggressively (Vite uses content hashes)
        location ~* \.html$ {
            expires 5m;
            add_header Cache-Control "no-cache";
        }
        location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
